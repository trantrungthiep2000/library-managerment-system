spring.application.name=library-managerment-service

# --- Config Database MySQL ---
spring.datasource.url=${MYSQL_DATASOURCE_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=${MYSQL_DATASOURCE_DRIVER_CLASS_NAME}

# --- Config Spring JPA ---
spring.jpa.database-platform=${SPRING_JPA_DATABASE_PLATFORM}
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DLL_AUTO}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL}

# --- Config Send Email ---
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS_ENABLE}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_SMTP_CONNECTION_TIME_OUT}
spring.mail.properties.mail.smtp.timeout=${MAIL_SMTP_TIME_OUT}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_SMTP_WRITE_TIME_OUT}

# --- Config Payment Gateway Razorpay ---
razorpay.key.id=${RAZORPAY_KEY_ID}
razorpay.key.secret=${RAZORPAY_KEY_SECRET}
razorpay.callback.base-url=${RAZORPAY_CALLBACK_BASE_URL}